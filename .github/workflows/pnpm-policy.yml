name: 🔒 pnpm supply-chain policy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  pnpm-policy:
    name: Verify pnpm supply-chain config
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      # we use pinned versions because there are safer to use: https://x.com/paulmillr/status/1900948425325031448
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        name: 🛎️ Checkout repository
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: 📚 Setup Node.js
        with:
          node-version: lts/*

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📦 Install pinned package manager # from package.json
        run: corepack install

      - name: Verify pnpm supply-chain config
        id: pnpm-policy
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          required_pnpm_version="10.16.0"
          actual_pnpm_version="$(pnpm --version)"

          if ! printf '%s\n%s\n' "$required_pnpm_version" "$actual_pnpm_version" | sort -CV; then
            echo "❌ pnpm version must be >= $required_pnpm_version (got $actual_pnpm_version)"
            exit 1
          fi

          echo "✅ pnpm version=$actual_pnpm_version (>= $required_pnpm_version)"

          verify_config() {
            local key="$1"
            local expected="$2"

            local actual
            actual="$(pnpm config get "$key" --location project 2>/dev/null || true)"
            actual="${actual%\"}"
            actual="${actual#\"}"

            if [[ "$actual" != "$expected" ]]; then
              echo "❌ $key mismatch: expected '$expected', got '${actual:-<empty>}'"
              exit 1
            fi

            echo "✅ $key=$actual"
          }

          verify_config minimum-release-age 7200
          verify_config block-exotic-subdeps true
          verify_config trust-policy no-downgrade

      - name: 🔍 Get PR URL
        if: steps.pnpm-policy.outcome == 'failure'
        id: pr-url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          PR_URL=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GH_REPOSITORY/pulls?head=$GH_REPOSITORY_OWNER:$GH_REF_NAME" \
            | jq -r '.[0].html_url // empty')
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: 📧 Send email
        if: steps.pnpm-policy.outcome == 'failure'
        # https://github.com/dawidd6/action-send-mail
        uses: dawidd6/action-send-mail@d38f3f7cd391cdebfe0d38efc3998b935e951c4f # v16
        with:
          server_address: smtp.gmail.com
          server_port: 587
          from: "GitHub Actions (no-reply) <${{ secrets.EMAIL_USERNAME }}>"
          to: ${{ secrets.EMAIL_USERNAME }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ❌ pnpm Supply-Chain Policy Failed for ${{ github.repository }}
          body: |
            pnpm supply-chain policy verification for ${{ github.repository }} has failed.

            For more details, please check:
            - GitHub Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ${{ steps.pr-url.outputs.pr_url && format('- Pull Request: {0}', steps.pr-url.outputs.pr_url) }}

      - name: ❌ Mark workflow failed on pnpm policy failure
        if: steps.pnpm-policy.outcome == 'failure'
        run: exit 1
