name: 📅 Monthly Recurring Invoice

concurrency:
  group: recurring-invoice
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    # Run every day from the 10th to the 12th.
    # We need this range because:
    # - if the 10th is a weekday -> run on 10th
    # - if the 10th is Saturday -> run on Monday 12th
    # - if the 10th is Sunday -> run on Monday 11th
    # GitHub Actions cron is UTC-only; 10:35 UTC = 12:35 in Warsaw summer time (CEST, UTC+2).
    # During Warsaw winter time (CET, UTC+1) this will run at 11:35 local instead.
    - cron: "35 10 10-12 * *"

jobs:
  recurring-invoice:
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 10 # we set a timeout to 5 minutes to avoid the workflow running indefinitely
    env:
      TZ: Europe/Warsaw # we use Europe/Warsaw timezone for consistent date handling across local machines and CI

    steps:
      - name: Determine whether workflow should run today
        id: date-check
        run: |
          output=$(node <<'EOF'
          // Use local time (Europe/Warsaw) for date calculations.
          // This ensures consistency with the job's TZ env and Telegram timestamps.
          const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: 'Europe/Warsaw',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            weekday: 'long'
          })
          // Get current date/time in Warsaw timezone
          const now = new Date()
          // Parse the formatted date into individual components
          const parts = formatter.formatToParts(now)
          // Helper to extract specific date component by type
          const getPart = (type) => parts.find(p => p.type === type)?.value

          // Extract year, month (convert to 0-based), day, and weekday index
          const year = parseInt(getPart('year'))
          const month = parseInt(getPart('month')) - 1 // zero-based for Date constructor

          const today = parseInt(getPart('day'))

          // Map weekday name to numeric index (0 = Sunday, 6 = Saturday)
          const todayWeekday = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].indexOf(getPart('weekday'))

          // Create a Date object for the 10th day of the current month.
          // Using Intl to get the 10th in Warsaw timezone.
          const tenthFormatter = new Intl.DateTimeFormat('en-US', {
            timeZone: 'Europe/Warsaw',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            weekday: 'long'
          })
          const tenthDate = new Date(year, month, 10)

          // Format the 10th day in Warsaw timezone to extract its weekday
          const tenthParts = tenthFormatter.formatToParts(tenthDate)

          // Helper function to get specific part from formatted date (e.g., 'weekday', 'day')
          const tenthGetPart = (type) => tenthParts.find(p => p.type === type)?.value

          // Convert weekday name (e.g., 'Saturday') to numeric index (0-6, where 0=Sunday, 6=Saturday)
          const weekday = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].indexOf(tenthGetPart('weekday'))

          // Default execution date is the 10th.
          let targetDay = 10

          // If the 10th falls on Saturday, move execution to Monday the 12th.
          if (weekday === 6) {
            targetDay = 12
          }

          // If the 10th falls on Sunday, move execution to Monday the 11th.
          if (weekday === 0) {
            targetDay = 11
          }

          // Final decision: run only if today matches computed target day.
          const shouldRun = today === targetDay

          // Expose values to later GitHub Action steps.
          process.stdout.write(
            `should_run=${shouldRun}\n` +
            `weekday=${weekday}\n` +
            `target_day=${targetDay}\n` +
            `today=${today}\n` +
            `today_weekday=${todayWeekday}\n` +
            `today_weekday_name=${getPart('weekday')}\n`
          )
          EOF
          )
          echo "$output" >> $GITHUB_OUTPUT

      - name: Send date-check notification to Telegram
        env:
          WEEKDAY: ${{ steps.date-check.outputs.weekday }}
          TARGET_DAY: ${{ steps.date-check.outputs.target_day }}
          SHOULD_RUN: ${{ steps.date-check.outputs.should_run }}
          TODAY_WEEKDAY_NAME: ${{ steps.date-check.outputs.today_weekday_name }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_GITHUB_ACTIONS_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_GITHUB_ACTIONS_CHAT_ID }}
        run: |
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NOW="$(date '+%d.%m.%Y %H:%M:%S %Z')"
          BILLING_PERIOD="$(date '+%B %Y')"

          WEEKDAY_NAMES=("Sunday" "Monday" "Tuesday" "Wednesday" "Thursday" "Friday" "Saturday")
          WEEKDAY_NAME="${WEEKDAY_NAMES[$WEEKDAY]}"

          WEEKEND_LINE=""
          if [ "$WEEKDAY" == "0" ] || [ "$WEEKDAY" == "6" ]; then
            WEEKEND_LINE=$'10th was a weekend ('"$WEEKDAY_NAME"$'), so execution moved to Monday ('"$TARGET_DAY"$').\n\n'
          fi

          if [ "$SHOULD_RUN" == "true" ]; then
            STATUS="✅ Status: Proceeding with invoice generation"
          else
            STATUS="⏭️ Status: Skipped (awaiting correct date)"
          fi

          export TEXT=$'📅 Monthly Invoice Workflow\n\n'"🕒 ${NOW} (${TODAY_WEEKDAY_NAME})"$'\n\n<b>Billing period:</b> '"${BILLING_PERIOD}"$'\n\n'"${WEEKEND_LINE}${STATUS}"$'\n\n🔗 <a href="'"${WORKFLOW_URL}"$'">View Workflow</a>'

          node <<'EOF'
          ;(async () => {
            const text = process.env.TEXT
            const payload = {
              chat_id: process.env.TELEGRAM_CHAT_ID,
              text,
              parse_mode: "HTML",
              disable_web_page_preview: true,
            }

            const response = await fetch(
              `https://api.telegram.org/bot${process.env.TELEGRAM_BOT_TOKEN}/sendMessage`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              },
            )
            const body = await response.text()
            if (!response.ok) {
              console.error("Telegram API error:", body)
              process.exit(1)
            }
            console.log("Telegram notification sent:", body)
          })().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          EOF

      - name: Generate monthly recurring invoice
        id: generate-invoice
        # Execute only if date-check step decided
        # that today is the correct execution day.
        if: steps.date-check.outputs.should_run == 'true'
        run: |
          INVOICE_API_URL='https://easyinvoicepdf.com/api/generate-invoice'

          echo "✅ [monthly-recurring-invoice github actions workflow] Generating monthly recurring invoice at $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "👉 [monthly-recurring-invoice github actions workflow] GET ${INVOICE_API_URL}"

          curl --fail-with-body \
            --silent \
            --show-error \
            -X GET \
            --max-time 60 \
            -H "Authorization: Bearer ${{ secrets.INVOICE_AUTH_TOKEN }}" \
            "${INVOICE_API_URL}"

      - name: 📧 Send email
        if: failure()
        # https://github.com/dawidd6/action-send-mail
        uses: dawidd6/action-send-mail@d38f3f7cd391cdebfe0d38efc3998b935e951c4f # v16
        with:
          server_address: smtp.gmail.com
          server_port: 587
          from: "GitHub Actions (no-reply) <${{ secrets.EMAIL_USERNAME }}>"
          to: ${{ secrets.EMAIL_USERNAME }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ❌ Monthly Recurring Invoice Failed for ${{ github.repository }}
          body: |
            Monthly recurring invoice workflow for ${{ github.repository }} has failed.

            For more details, please check:
            - GitHub Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
